<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Rounded corner clip -->
    <clipPath id="roundClip">
      <rect width="512" height="512" rx="96"/>
    </clipPath>

    <!-- Sun gradient: orange top → pink middle → purple bottom -->
    <linearGradient id="sunGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="50%" stop-color="#ff2d95"/>
      <stop offset="100%" stop-color="#b026ff"/>
    </linearGradient>

    <!-- Glow behind sun -->
    <radialGradient id="glow" cx="256" cy="240" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff2d95" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#ff2d95" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff2d95" stop-opacity="0"/>
    </radialGradient>

    <!-- Scan line mask: horizontal gaps that cut through the sun -->
    <mask id="scanLines">
      <rect width="512" height="512" fill="white"/>
      <!-- Scan line gaps (black = hidden) -->
      <rect x="0" y="200" width="512" height="6" fill="black"/>
      <rect x="0" y="218" width="512" height="8" fill="black"/>
      <rect x="0" y="240" width="512" height="10" fill="black"/>
      <rect x="0" y="264" width="512" height="12" fill="black"/>
      <rect x="0" y="290" width="512" height="14" fill="black"/>
    </mask>

    <!-- Clip sun to upper half (above horizon at y=310) -->
    <clipPath id="sunClip">
      <rect x="0" y="0" width="512" height="310"/>
    </clipPath>
  </defs>

  <g clip-path="url(#roundClip)">
    <!-- Background -->
    <rect width="512" height="512" fill="#0a0a1a"/>

    <!-- Glow behind sun -->
    <ellipse cx="256" cy="260" rx="220" ry="160" fill="url(#glow)"/>

    <!-- Sun with scan lines -->
    <g clip-path="url(#sunClip)" mask="url(#scanLines)">
      <circle cx="256" cy="260" r="120" fill="url(#sunGrad)"/>
    </g>

    <!-- Horizon line -->
    <line x1="0" y1="310" x2="512" y2="310" stroke="#00f0ff" stroke-width="2" opacity="0.8"/>

    <!-- Perspective grid below horizon -->
    <g opacity="0.35" stroke="#00f0ff" stroke-width="1">
      <!-- Horizontal lines (compressed spacing toward horizon) -->
      <line x1="0" y1="320" x2="512" y2="320"/>
      <line x1="0" y1="332" x2="512" y2="332"/>
      <line x1="0" y1="348" x2="512" y2="348"/>
      <line x1="0" y1="368" x2="512" y2="368"/>
      <line x1="0" y1="394" x2="512" y2="394"/>
      <line x1="0" y1="428" x2="512" y2="428"/>
      <line x1="0" y1="472" x2="512" y2="472"/>

      <!-- Vertical lines fanning from vanishing point (256, 310) -->
      <line x1="256" y1="310" x2="256" y2="512"/>
      <line x1="256" y1="310" x2="206" y2="512"/>
      <line x1="256" y1="310" x2="306" y2="512"/>
      <line x1="256" y1="310" x2="146" y2="512"/>
      <line x1="256" y1="310" x2="366" y2="512"/>
      <line x1="256" y1="310" x2="76" y2="512"/>
      <line x1="256" y1="310" x2="436" y2="512"/>
      <line x1="256" y1="310" x2="-10" y2="512"/>
      <line x1="256" y1="310" x2="522" y2="512"/>
      <line x1="256" y1="310" x2="-110" y2="512"/>
      <line x1="256" y1="310" x2="622" y2="512"/>
    </g>
  </g>
</svg>
