<!doctype html>
<html lang="en" data-theme="synthwave">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }}</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
        background: radial-gradient(circle at 20% 5%, #23104e, #090f1f 52%, #070b15 100%);
        color: #dbe8f8;
      }
      .app {
        display: grid;
        grid-template-columns: 220px 1fr;
        min-height: 100vh;
      }
      .sidebar {
        border-right: 1px solid rgba(124, 58, 237, 0.4);
        background: linear-gradient(180deg, rgba(2, 6, 23, 0.94), rgba(3, 7, 18, 0.98));
        padding: 0.9rem 0.7rem 1rem;
      }
      .brand {
        display: block;
        color: #f72585;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 0.06em;
        margin-bottom: 0.75rem;
      }
      .nav-list { list-style: none; margin: 0; padding: 0; }
      .nav-link {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        width: 100%;
        color: #b9c7d9;
        text-decoration: none;
        padding: 0.16rem 0.3rem;
        border-radius: 4px;
        font-size: 0.86rem;
      }
      .nav-link:hover { color: #f8fafc; background: rgba(17, 24, 39, 0.6); }
      .nav-link.active {
        color: #67e8f9;
        text-shadow: 0 0 12px rgba(34, 211, 238, 0.35);
      }
      .dot {
        width: 0.42rem;
        height: 0.42rem;
        border-radius: 50%;
        background: #ec4899;
        box-shadow: 0 0 12px rgba(236, 72, 153, 0.65);
      }
      .auth-box {
        margin-top: 1rem;
        border-top: 1px solid rgba(148, 163, 184, 0.2);
        padding-top: 0.7rem;
      }
      .auth-status {
        margin: 0 0 0.45rem;
        color: #93c5fd;
        font-size: 0.74rem;
      }
      .auth-actions {
        display: flex;
        gap: 0.35rem;
        flex-wrap: wrap;
      }
      .auth-btn {
        border: 1px solid rgba(148, 163, 184, 0.3);
        color: #cbd5e1;
        background: rgba(15, 23, 42, 0.7);
        border-radius: 8px;
        font-size: 0.74rem;
        padding: 0.25rem 0.45rem;
        text-decoration: none;
        cursor: pointer;
      }
      .auth-btn.logout { border-color: rgba(244, 114, 182, 0.45); color: #fda4af; }
      .content {
        padding: 1.3rem;
      }
      .panel {
        max-width: 520px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(7, 12, 24, 0.7);
        border-radius: 10px;
        padding: 1rem;
      }
      h1 {
        margin: 0 0 0.8rem;
        color: #f8fafc;
        font-size: 1.25rem;
      }
      .field {
        display: grid;
        gap: 0.35rem;
        margin-bottom: 0.8rem;
      }
      label { font-size: 0.8rem; color: #bfdbfe; }
      input {
        width: 100%;
        border: 1px solid rgba(148, 163, 184, 0.35);
        background: rgba(15, 23, 42, 0.7);
        color: #e2e8f0;
        border-radius: 8px;
        padding: 0.5rem 0.55rem;
      }
      .submit {
        border: 1px solid rgba(34, 211, 238, 0.45);
        color: #67e8f9;
        background: rgba(8, 47, 73, 0.4);
        border-radius: 8px;
        padding: 0.45rem 0.8rem;
        font-weight: 700;
        cursor: pointer;
      }
      .status {
        margin-top: 0.7rem;
        min-height: 1.1rem;
        font-size: 0.8rem;
        color: #93c5fd;
      }
      .switch {
        margin-top: 0.8rem;
        font-size: 0.8rem;
        color: #bfdbfe;
      }
      .switch a { color: #67e8f9; }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <a class="brand" href="/">SYNTHWAVES FM</a>
        <nav aria-label="Primary">
          <ul class="nav-list">
            <li><a class="nav-link" href="/"><span class="dot"></span>Dashboard</a></li>
            <li><a class="nav-link" href="/radio"><span class="dot"></span>Live Radio</a></li>
            <li><a class="nav-link" href="/search"><span class="dot"></span>Search</a></li>
            <li><a class="nav-link" href="/stats"><span class="dot"></span>Stats</a></li>
            <li><a class="nav-link" href="/login"><span class="dot"></span>Login</a></li>
            <li><a class="nav-link active" href="/register"><span class="dot"></span>Register</a></li>
          </ul>
        </nav>
        <section class="auth-box">
          <p id="authStatus" class="auth-status">Signed out</p>
          <div class="auth-actions">
            <button id="logoutBtn" class="auth-btn logout" type="button" hidden>Logout</button>
          </div>
        </section>
      </aside>
      <main class="content">
        <section class="panel">
          <h1>Create account</h1>
          <form id="registerForm">
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="field">
              <label for="password">Password (8+ characters)</label>
              <input id="password" name="password" type="password" minlength="8" autocomplete="new-password" required />
            </div>
            <button class="submit" type="submit">Register</button>
          </form>
          <p id="status" class="status"></p>
          <p class="switch">Already have an account? <a href="/login">Log in</a></p>
        </section>
      </main>
    </div>
    <script>
      const JWT_KEY = "synthwaves.jwt";
      const authStatus = document.getElementById("authStatus");
      const logoutBtn = document.getElementById("logoutBtn");
      const statusEl = document.getElementById("status");
      const registerForm = document.getElementById("registerForm");

      async function refreshAuthState() {
        const token = localStorage.getItem(JWT_KEY);
        if (!token) {
          authStatus.textContent = "Signed out";
          logoutBtn.hidden = true;
          return;
        }
        try {
          const res = await fetch("/api/v1/me", {
            headers: { Authorization: `Bearer ${token}` }
          });
          if (!res.ok) throw new Error("unauthorized");
          authStatus.textContent = "Signed in";
          logoutBtn.hidden = false;
          statusEl.textContent = "Already signed in.";
        } catch (_) {
          localStorage.removeItem(JWT_KEY);
          authStatus.textContent = "Signed out";
          logoutBtn.hidden = true;
        }
      }

      logoutBtn.addEventListener("click", () => {
        localStorage.removeItem(JWT_KEY);
        window.location.assign("/login");
      });

      registerForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        statusEl.textContent = "Creating account...";
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        try {
          const res = await fetch("/api/v1/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password })
          });
          const payload = await res.json().catch(() => ({}));
          if (!res.ok || !payload.token) {
            statusEl.textContent = payload.error || "Registration failed.";
            return;
          }
          localStorage.setItem(JWT_KEY, payload.token);
          statusEl.textContent = "Success. Redirecting...";
          window.location.assign("/");
        } catch (_) {
          statusEl.textContent = "Network error while registering.";
        }
      });

      refreshAuthState();
    </script>
  </body>
</html>
