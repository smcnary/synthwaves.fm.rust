<!doctype html>
<html lang="en" data-theme="synthwave">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }}</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
        background: radial-gradient(circle at 20% 5%, #23104e, #090f1f 52%, #070b15 100%);
        color: #dbe8f8;
      }
      .app {
        display: grid;
        grid-template-columns: 220px 1fr;
        min-height: 100vh;
      }
      .sidebar {
        border-right: 1px solid rgba(124, 58, 237, 0.4);
        background: linear-gradient(180deg, rgba(2, 6, 23, 0.94), rgba(3, 7, 18, 0.98));
        padding: 0.9rem 0.7rem 1rem;
      }
      .brand {
        display: block;
        color: #f72585;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 0.06em;
        margin-bottom: 0.75rem;
      }
      .nav-list { list-style: none; margin: 0; padding: 0; }
      .nav-link {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        width: 100%;
        color: #b9c7d9;
        text-decoration: none;
        padding: 0.16rem 0.3rem;
        border-radius: 4px;
        font-size: 0.86rem;
      }
      .nav-link:hover { color: #f8fafc; background: rgba(17, 24, 39, 0.6); }
      .nav-link:focus-visible {
        outline: 2px solid #22d3ee;
        outline-offset: 1px;
      }
      .dot {
        width: 0.42rem;
        height: 0.42rem;
        border-radius: 50%;
        background: #ec4899;
        box-shadow: 0 0 12px rgba(236, 72, 153, 0.65);
      }
      .nav-link.placeholder {
        opacity: 0.68;
      }
      .coming {
        margin-left: auto;
        font-size: 0.64rem;
        color: #fda4af;
      }
      .auth-box {
        margin-top: 1rem;
        border-top: 1px solid rgba(148, 163, 184, 0.2);
        padding-top: 0.7rem;
      }
      .auth-status {
        margin: 0 0 0.45rem;
        color: #93c5fd;
        font-size: 0.74rem;
      }
      .auth-actions {
        display: flex;
        gap: 0.35rem;
        flex-wrap: wrap;
      }
      .auth-btn {
        border: 1px solid rgba(148, 163, 184, 0.3);
        color: #cbd5e1;
        background: rgba(15, 23, 42, 0.7);
        border-radius: 8px;
        font-size: 0.74rem;
        padding: 0.25rem 0.45rem;
        text-decoration: none;
        cursor: pointer;
      }
      .auth-btn:hover { border-color: rgba(34, 211, 238, 0.45); color: #67e8f9; }
      .auth-btn.logout { border-color: rgba(244, 114, 182, 0.45); color: #fda4af; }
      .content {
        display: flex;
        align-items: center;
        padding: 1.2rem;
      }
      .panel {
        max-width: 800px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(7, 12, 24, 0.7);
        border-radius: 10px;
        padding: 1rem;
      }
      h1 { margin: 0 0 0.65rem; }
      p { margin: 0; color: #bfdbfe; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <a class="brand" href="/">SYNTHWAVES FM</a>
        <nav aria-label="Primary">
          <ul class="nav-list">
            <li><a class="nav-link" href="/"><span class="dot"></span>Dashboard</a></li>
            <li><a class="nav-link placeholder" href="/artists"><span class="dot"></span>Artists <span class="coming">soon</span></a></li>
            <li><a class="nav-link placeholder" href="/albums"><span class="dot"></span>Albums <span class="coming">soon</span></a></li>
            <li><a class="nav-link placeholder" href="/tracks"><span class="dot"></span>Tracks <span class="coming">soon</span></a></li>
            <li><a class="nav-link placeholder" href="/playlists"><span class="dot"></span>Playlists <span class="coming">soon</span></a></li>
            <li><a class="nav-link placeholder" href="/favorites"><span class="dot"></span>Favorites <span class="coming">soon</span></a></li>
            <li><a class="nav-link" href="/radio"><span class="dot"></span>Live Radio</a></li>
            <li><a class="nav-link placeholder" href="/my"><span class="dot"></span>My <span class="coming">soon</span></a></li>
            <li><a class="nav-link" href="/search"><span class="dot"></span>Search</a></li>
            <li><a class="nav-link" href="/stats"><span class="dot"></span>Stats</a></li>
          </ul>
        </nav>
        <section class="auth-box">
          <p id="authStatus" class="auth-status">Signed out</p>
          <div class="auth-actions">
            <a id="loginLink" class="auth-btn" href="/login">Login</a>
            <a id="registerLink" class="auth-btn" href="/register">Register</a>
            <button id="logoutBtn" class="auth-btn logout" type="button" hidden>Logout</button>
          </div>
        </section>
      </aside>
      <main class="content">
        <section class="panel">
          <h1>{{ heading }}</h1>
          <p>{{ description }}</p>
        </section>
      </main>
    </div>
    <script>
      const JWT_KEY = "synthwaves.jwt";
      const statusEl = document.getElementById("authStatus");
      const loginLink = document.getElementById("loginLink");
      const registerLink = document.getElementById("registerLink");
      const logoutBtn = document.getElementById("logoutBtn");

      async function refreshAuthState() {
        const token = localStorage.getItem(JWT_KEY);
        if (!token) {
          statusEl.textContent = "Signed out";
          loginLink.hidden = false;
          registerLink.hidden = false;
          logoutBtn.hidden = true;
          return;
        }
        try {
          const res = await fetch("/api/v1/me", {
            headers: { Authorization: `Bearer ${token}` }
          });
          if (!res.ok) throw new Error("unauthorized");
          statusEl.textContent = "Signed in";
          loginLink.hidden = true;
          registerLink.hidden = true;
          logoutBtn.hidden = false;
        } catch (_) {
          localStorage.removeItem(JWT_KEY);
          statusEl.textContent = "Signed out";
          loginLink.hidden = false;
          registerLink.hidden = false;
          logoutBtn.hidden = true;
        }
      }

      logoutBtn.addEventListener("click", () => {
        localStorage.removeItem(JWT_KEY);
        window.location.assign("/login");
      });
      refreshAuthState();
    </script>
  </body>
</html>
