<!doctype html>
<html lang="en" data-theme="synthwave">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title }}</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "SFMono-Regular", ui-monospace, Menlo, Consolas, monospace;
        background: radial-gradient(circle at 20% 5%, #23104e, #090f1f 52%, #070b15 100%);
        color: #dbe8f8;
      }
      .app {
        display: grid;
        grid-template-columns: 220px 1fr;
        min-height: 100vh;
      }
      .sidebar {
        border-right: 1px solid rgba(124, 58, 237, 0.4);
        background: linear-gradient(180deg, rgba(2, 6, 23, 0.94), rgba(3, 7, 18, 0.98));
        padding: 0.9rem 0.7rem 1rem;
      }
      .brand {
        display: block;
        color: #f72585;
        text-decoration: none;
        font-weight: 700;
        letter-spacing: 0.06em;
        margin-bottom: 0.75rem;
      }
      .nav-list { list-style: none; margin: 0; padding: 0; }
      .nav-link {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        width: 100%;
        color: #b9c7d9;
        text-decoration: none;
        padding: 0.16rem 0.3rem;
        border-radius: 4px;
        font-size: 0.86rem;
      }
      .nav-link:hover { color: #f8fafc; background: rgba(17, 24, 39, 0.6); }
      .nav-link:focus-visible {
        outline: 2px solid #22d3ee;
        outline-offset: 1px;
      }
      .dot {
        width: 0.42rem;
        height: 0.42rem;
        border-radius: 50%;
        background: #ec4899;
        box-shadow: 0 0 12px rgba(236, 72, 153, 0.65);
      }
      .nav-link.placeholder {
        opacity: 0.68;
      }
      .coming {
        margin-left: auto;
        font-size: 0.64rem;
        color: #fda4af;
      }
      .content {
        display: flex;
        align-items: center;
        padding: 1.2rem;
      }
      .panel {
        max-width: 800px;
        border: 1px solid rgba(148, 163, 184, 0.22);
        background: rgba(7, 12, 24, 0.7);
        border-radius: 10px;
        padding: 1rem;
      }
      h1 { margin: 0 0 0.65rem; }
      p { margin: 0; color: #bfdbfe; line-height: 1.5; }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <a class="brand" href="/">SYNTHWAVES FM</a>
        <nav aria-label="Primary">
          <ul class="nav-list">
            <li><a class="nav-link" href="/"><span class="dot"></span>Dashboard</a></li>
            <li><a class="nav-link placeholder" href="/artists"><span class="dot"></span>Artists <span class="coming">soon</span></a></li>
            <li><a class="nav-link placeholder" href="/albums"><span class="dot"></span>Albums <span class="coming">soon</span></a></li>
            <li><a class="nav-link placeholder" href="/tracks"><span class="dot"></span>Tracks <span class="coming">soon</span></a></li>
            <li><a class="nav-link placeholder" href="/playlists"><span class="dot"></span>Playlists <span class="coming">soon</span></a></li>
            <li><a class="nav-link placeholder" href="/favorites"><span class="dot"></span>Favorites <span class="coming">soon</span></a></li>
            <li><a class="nav-link" href="/radio"><span class="dot"></span>Live Radio</a></li>
            <li><a class="nav-link placeholder" href="/my"><span class="dot"></span>My <span class="coming">soon</span></a></li>
            <li><a class="nav-link" href="/search"><span class="dot"></span>Search</a></li>
            <li><a class="nav-link" href="/stats"><span class="dot"></span>Stats</a></li>
          </ul>
        </nav>
      </aside>
      <main class="content">
        <section class="panel">
          <h1>{{ heading }}</h1>
          <p>{{ description }}</p>
        </section>
      </main>
    </div>
  </body>
</html>
