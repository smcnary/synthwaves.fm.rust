# synthwaves.fm - Self-hosted music streaming
# Quick start: docker compose up -d
# Configuration: copy .env.example to .env and customize as needed
#
# Rust Axum API (matches Railway: SQLite on a persistent volume under /data/db):
#   docker compose up -d --build axum
# With radio profile, point Liquidsoap at the API (e.g. RAILS_HOST=axum:4000) and
# set ICECAST_HOST=icecast so the API container can reach Icecast.

services:
  axum:
    build:
      context: .
      dockerfile: Dockerfile.rust
    ports:
      - "${AXUM_PORT:-4000}:4000"
    volumes:
      - axum_data:/data
    env_file:
      - path: .env
        required: false
    environment:
      HOST: "0.0.0.0"
      PORT: "4000"
      DATABASE_URL: "sqlite:/data/db/development.sqlite3"
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      LIQUIDSOAP_API_TOKEN: ${LIQUIDSOAP_API_TOKEN:-dev-liquidsoap-token}
      RAILS_HOST: ${RAILS_HOST:-localhost:4000}
      RAILS_PROTOCOL: ${RAILS_PROTOCOL:-http}
      ICECAST_PROTOCOL: ${ICECAST_PROTOCOL:-http}
      ICECAST_HOST: ${ICECAST_HOST:-localhost}
      ICECAST_PORT: ${ICECAST_PORT:-8000}
      ICECAST_ADMIN_USERNAME: ${ICECAST_ADMIN_USERNAME:-admin}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASSWORD:-hackme}
    restart: unless-stopped

  web:
    image: ghcr.io/leopolicastro/synthwaves:latest
    ports:
      - "${PORT:-3000}:80"
    volumes:
      - storage:/rails/storage
    env_file:
      - path: .env
        required: false
    environment:
      - SOLID_QUEUE_IN_PUMA=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Uncomment to run background jobs in a separate container (for larger deployments)
  # worker:
  #   image: ghcr.io/leopolicastro/synthwaves:latest
  #   command: bin/jobs
  #   volumes:
  #     - storage:/rails/storage
  #   env_file:
  #     - path: .env
  #       required: false
  #   environment:
  #     - SOLID_QUEUE_IN_PUMA=false
  #   restart: unless-stopped

  # Icecast + Liquidsoap for local radio (Rust axum-app on host). Usage: see README.md.
  icecast:
    profiles: ["radio"]
    image: moul/icecast:latest
    ports:
      - "${ICECAST_PORT:-8000}:8000"
    environment:
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD:-hackme}
      ICECAST_ADMIN_PASSWORD: ${ICECAST_ADMIN_PASSWORD:-hackme}
      ICECAST_HOSTNAME: ${ICECAST_HOSTNAME:-localhost}
    restart: unless-stopped

  liquidsoap:
    profiles: ["radio"]
    image: savonet/liquidsoap:v2.3.3
    depends_on:
      - icecast
    environment:
      LIQUIDSOAP_API_TOKEN: ${LIQUIDSOAP_API_TOKEN:-dev-liquidsoap-token}
      ICECAST_INTERNAL_HOST: icecast
      ICECAST_INTERNAL_PORT: "8000"
      ICECAST_SOURCE_PASSWORD: ${ICECAST_SOURCE_PASSWORD:-hackme}
      RAILS_HOST: ${RAILS_HOST:-host.docker.internal:4000}
      RAILS_PROTOCOL: ${RAILS_PROTOCOL:-http}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docker/radio/radio.liq:/etc/liquidsoap/radio.liq:ro
    command: ["liquidsoap", "/etc/liquidsoap/radio.liq"]
    restart: unless-stopped

volumes:
  storage:
  axum_data:
