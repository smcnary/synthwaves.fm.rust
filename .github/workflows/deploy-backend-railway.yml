name: Deploy Backend to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: railway-production-deploy
  cancel-in-progress: false

jobs:
  checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

      - name: Compile check
        run: cargo check --workspace

  build:
    runs-on: ubuntu-latest
    needs: checks
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build release binary
        run: cargo build --locked --release --package axum-app

  deploy:
    name: Deploy production backend
    runs-on: ubuntu-latest
    needs: build
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Validate Railway secrets
        run: |
          set -euo pipefail
          if [[ -z "${RAILWAY_TOKEN:-}" ]]; then
            echo "Missing required secret: RAILWAY_TOKEN"
            exit 1
          fi
          if [[ -z "${RAILWAY_PROJECT_ID:-}" ]]; then
            echo "Missing required secret: RAILWAY_PROJECT_ID"
            exit 1
          fi

      - name: Link Railway project
        run: |
          set -euo pipefail
          link_args=(--project "$RAILWAY_PROJECT_ID")
          if [[ -n "${RAILWAY_ENVIRONMENT:-}" ]]; then
            link_args+=(--environment "$RAILWAY_ENVIRONMENT")
          fi
          if [[ -n "${RAILWAY_SERVICE:-}" ]]; then
            link_args+=(--service "$RAILWAY_SERVICE")
          fi
          railway link "${link_args[@]}"

      - name: Deploy to Railway
        run: railway up --detach --ci
