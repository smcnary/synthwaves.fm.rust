name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin_ext: ""
          - os: macos-13
            target: x86_64-apple-darwin
            bin_ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin_ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target

      - name: Build release binary
        working-directory: rust
        run: cargo build --locked --release --package axum-app --target ${{ matrix.target }}

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"
          asset_name="axum-app-${version}-${{ matrix.target }}.tar.gz"
          binary_path="rust/target/${{ matrix.target }}/release/axum-app${{ matrix.bin_ext }}"

          mkdir -p dist/package
          cp "$binary_path" "dist/package/axum-app${{ matrix.bin_ext }}"
          tar -czf "dist/${asset_name}" -C dist/package "axum-app${{ matrix.bin_ext }}"

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          fail_on_unmatched_files: true
          generate_release_notes: true
